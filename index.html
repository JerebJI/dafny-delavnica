<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>

		<title>Dafny delavnica</title>
		<link rel="icon" href="media/favicon.ico">

		<link rel="stylesheet" href="dist/reset.css" />
		<link rel="stylesheet" href="dist/reveal.css" />
		<link rel="stylesheet" href="dist/theme/white.css" />

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="dist/plugin/highlight/monokai.css" />
	</head>
	<style>
		@font-face {
			font-family: 'CanvaSans-Regular';
			src: url('/media/CanvaSans-Regular.otf') font("openType");
			font-weight: normal;
			font-style: normal;
		}
		.banner {
			background: #ffde59;
			border: black;
			border-style: solid;
			color: black !important;
			padding: 10px 30px;
			margin: 10px;
			font-size: 50px;
			/* box-shadow: 5px 5px 0px black; */
			font-family: 'CanvaSans-Regular';
			border-radius: 12px;
		}
		.download {
			background: #ffde59;
			border: black;
			border-style: solid;
			color: black !important;
			padding: 10px 30px;
			margin: 10px;
			font-size: 50px;
			font-family: 'CanvaSans-Regular';
			border-radius: 10px;
		}
		.download:hover {
			background: #f7d756;
			border: black !important;
			border-style: solid !important;
			box-shadow: 2.5px 2.5px 0 black;
		}
		body {
			font-family: 'CanvaSans-Regular';
		}
		.url {
			margin: 80px 0 80px;
			color: black;
			font-size: 70px;
		}
	</style>
	<body>
		<div class="reveal">
			<div class="slides" data-background-color="#f5f5f5">
				<section>
					<div class="url">jerebji.github.io/dafny-delavnica</div>
					<a class="download" style="margin:auto;justify-content: center;" href="media/delavnica.dfy" download>
						<img style="vertical-align:middle; transform: translate(-12%,-13%);"
						     src="media/download-svgrepo-com.svg"
							 width="5%" height="5%" alt="Download">
						delavnica.dfy
					</a>
				</section>
			</div>
		</div>

		<script src="dist/reveal.js"></script>
		<script src="dist/plugin/notes.js"></script>
		<script src="dist/plugin/markdown.js"></script>
		<script src="dist/plugin/highlight.js"></script>
		<script>
			// More info about initialization & config:
			// - https://revealjs.com/initialization/
			// - https://revealjs.com/config/
			Reveal.initialize({
				hash: true,

				// Learn about plugins: https://revealjs.com/plugins/
				plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
			});
		</script>
	</body>
