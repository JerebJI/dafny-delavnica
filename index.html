<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>

		<title>Dafny delavnica</title>
		<link rel="icon" href="media/favicon.ico">

		<link rel="stylesheet" href="dist/reset.css" />
		<link rel="stylesheet" href="dist/reveal.css" />
		<link rel="stylesheet" href="dist/theme/white.css" />

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="dist/plugin/highlight/monokai.css" />
	</head>
	<style>
		@font-face {
			font-family: 'CanvaSans-Regular';
			src: url('/media/CanvaSans-Regular.otf') font("openType");
			font-weight: normal;
			font-style: normal;
		}
		.banner {
			background: #ffde59;
			border: black;
			border-style: solid;
			color: black;
			padding: 10px 30px;
			margin: 40px;
			font-size: var(--r-heading1-size);
			box-shadow: 5px 5px 0px black;
			font-family: 'CanvaSans-Regular';
			border-radius: 12px;
		}
		.download-icon {
			cursor: pointer;
			border-style: solid !important;
			background: #ffde59;
			border: black;
			transition: all 0.2s ease;
			border-radius: 12px;
		}

		.download-icon:hover {
			background: #ffe26f;
			box-shadow: 5px 5px 0 black;
		}
		body {
			font-family: 'CanvaSans-Regular';
		}
		.url {
			margin: 80px 0 50px;
			color: black;
			font-size: 55px;
		}
	</style>
	<body>
		<div class="reveal">
			<div class="slides" data-background-color="#f5f5f5">
				<section>
					<div class="banner">Dafny delavnica</div>
					<div class="url">jerebji.github.io/dafny-delavnica</div>
					<a href="media/delavnica.dfy" download>
						<img class="download-icon" src="media/download-svgrepo-com.svg" width="20%" height="20%" alt="Download">
					</a>
				</section>
			</div>
		</div>

		<script src="dist/reveal.js"></script>
		<script src="dist/plugin/notes.js"></script>
		<script src="dist/plugin/markdown.js"></script>
		<script src="dist/plugin/highlight.js"></script>
		<script>
			// More info about initialization & config:
			// - https://revealjs.com/initialization/
			// - https://revealjs.com/config/
			Reveal.initialize({
				hash: true,

				// Learn about plugins: https://revealjs.com/plugins/
				plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
			});
		</script>
	</body>
</html>
